name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run python -m pytest tests/ -q

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - name: Publish to PyPI (Trusted Publisher)
        run: uv publish --trusted-publishing always

  build-executables:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rtfm-linux-x86_64
          - os: windows-latest
            artifact: rtfm-windows-x86_64.exe
          - os: macos-latest
            artifact: rtfm-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv pip install pyinstaller
      - name: Build executable
        run: |
          uv run pyinstaller --onefile --name rtfm --hidden-import rtfm.server --hidden-import rtfm.ingest.pipeline --hidden-import rtfm.ingest.parsers.sphinx_rst --hidden-import rtfm.ingest.parsers.mkdocs_md --hidden-import rtfm.ingest.parsers.rustdoc_html --hidden-import rtfm.ingest.parsers.typedoc_html --hidden-import rtfm.ingest.extractors.sphinx --hidden-import rtfm.ingest.extractors.mkdocs --hidden-import rtfm.ingest.extractors.rustdoc --hidden-import rtfm.ingest.extractors.typedoc --hidden-import rtfm.health src/rtfm/cli.py
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/rtfm.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/rtfm "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  create-release:
    needs: [publish-pypi, build-executables]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Install git-cliff
        run: pip install git-cliff
      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*

  update-changelog:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Install git-cliff
        run: pip install git-cliff
      - name: Update CHANGELOG.md
        run: git-cliff -o CHANGELOG.md
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push

  update-aur:
    needs: publish-pypi
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: python-agent-rtfm
            files: "PKGBUILD .SRCINFO"
          - name: python-agent-rtfm-bin
            files: "PKGBUILD .SRCINFO"
          - name: python-agent-rtfm-git
            files: "PKGBUILD .SRCINFO"
    steps:
      - name: Set up SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
      - uses: actions/checkout@v4
        with:
          path: source
      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/${{ matrix.package.name }}.git aur
      - name: Copy contrib files
        run: |
          cp source/contrib/arch/rtfm.service aur/ 2>/dev/null || true
          cp source/contrib/arch/rtfm-update.service aur/ 2>/dev/null || true
          cp source/contrib/arch/rtfm-restart.hook aur/ 2>/dev/null || true
          cp source/contrib/arch/python-agent-rtfm.install aur/ 2>/dev/null || true
      - name: Update version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          # Regenerate .SRCINFO if makepkg is available, otherwise sed
          if command -v makepkg &>/dev/null; then
            makepkg --printsrcinfo > .SRCINFO
          else
            sed -i "s/pkgver = .*/pkgver = ${VERSION}/" .SRCINFO
            sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO
            sed -i "s|agent_rtfm-[0-9.]*|agent_rtfm-${VERSION}|g" .SRCINFO
          fi
          sed -i "s|agent_rtfm-[0-9.]*|agent_rtfm-${VERSION}|g" PKGBUILD
          # Validate replacement succeeded
          if ! grep -q "agent_rtfm-${VERSION}" PKGBUILD; then
            echo "WARNING: version pattern not found in PKGBUILD source line" >&2
          fi
      - name: Push to AUR
        run: |
          cd aur
          git config user.name "phlppbmm"
          git config user.email "philipp.baumm@gmx.net"
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${GITHUB_REF_NAME#v}"
          git push
