name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run python -m pytest tests/ -q

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - name: Publish to PyPI (Trusted Publisher)
        run: uv publish --trusted-publishing always

  build-executables:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rtfm-linux-x86_64
          - os: windows-latest
            artifact: rtfm-windows-x86_64.exe
          - os: macos-latest
            artifact: rtfm-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv pip install pyinstaller
      - name: Build executable
        run: |
          uv run pyinstaller --onefile --name rtfm --hidden-import rtfm.server --hidden-import rtfm.ingest.pipeline --hidden-import rtfm.ingest.parsers.sphinx_rst --hidden-import rtfm.ingest.parsers.mkdocs_md --hidden-import rtfm.ingest.parsers.rustdoc_html --hidden-import rtfm.ingest.parsers.typedoc_html --hidden-import rtfm.ingest.extractors.sphinx --hidden-import rtfm.ingest.extractors.mkdocs --hidden-import rtfm.ingest.extractors.rustdoc --hidden-import rtfm.ingest.extractors.typedoc --hidden-import rtfm.health src/rtfm/cli.py
      - name: Rename artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/rtfm.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/rtfm "dist/${{ matrix.artifact }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  create-release:
    needs: [publish-pypi, build-executables]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Install git-cliff
        run: pip install git-cliff
      - name: Generate release notes
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*

  update-changelog:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - name: Install git-cliff
        run: pip install git-cliff
      - name: Update CHANGELOG.md
        run: git-cliff -o CHANGELOG.md
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changelog changes" && exit 0
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push

  update-aur:
    needs: publish-pypi
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    strategy:
      matrix:
        package:
          - name: python-agent-rtfm
          - name: python-agent-rtfm-bin
          - name: python-agent-rtfm-git
    steps:
      - name: Set up Arch tooling
        run: |
          pacman -Sy --noconfirm namcap openssh git
          # makepkg refuses to run as root — create a build user
          useradd -m builder
      - name: Set up SSH
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p /root/.ssh
          echo "$AUR_SSH_KEY" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur
          cat > /root/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur
            User aur
            StrictHostKeyChecking accept-new
          SSHEOF
          chmod 600 /root/.ssh/config
      - uses: actions/checkout@v4
        with:
          path: source
      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/${{ matrix.package.name }}.git aur
      - name: Copy contrib files
        run: |
          cp source/contrib/arch/rtfm.service aur/ 2>/dev/null || true
          cp source/contrib/arch/rtfm-update.service aur/ 2>/dev/null || true
          cp source/contrib/arch/rtfm-restart.hook aur/ 2>/dev/null || true
          cp source/contrib/arch/python-agent-rtfm.install aur/ 2>/dev/null || true
      - name: Update version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # For -bin package: resolve the hash-based PyPI wheel URL
          if grep -q 'files.pythonhosted.org/packages/' PKGBUILD; then
            WHEEL_URL=$(curl -sL "https://pypi.org/simple/agent-rtfm/" \
              | grep -o "https://[^\"#]*agent_rtfm-${VERSION}-py3-none-any\\.whl" | head -1)
            if [ -n "$WHEEL_URL" ]; then
              # Replace the full source URL (everything after ::)
              sed -i "s|https://files.pythonhosted.org/packages/[^\"]*|${WHEEL_URL}|" PKGBUILD
            else
              echo "ERROR: wheel URL not found on PyPI for ${VERSION}" >&2
              exit 1
            fi
          fi

          # Regenerate .SRCINFO via makepkg (runs in Arch container)
          chown -R builder: .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"
      - name: Validate PKGBUILD
        run: |
          cd aur
          namcap PKGBUILD
          # Verify .SRCINFO is consistent
          su builder -c "makepkg --printsrcinfo" | diff -u .SRCINFO - || {
            echo "ERROR: .SRCINFO is out of sync with PKGBUILD" >&2
            exit 1
          }
      - name: Push to AUR
        run: |
          cd aur
          git config user.name "phlppbmm"
          git config user.email "philipp.baumm@gmx.net"
          git add -A
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to ${GITHUB_REF_NAME#v}"
          git push
